name: Deploy Pi

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-pi
  cancel-in-progress: true

jobs:
  deploy:
    name: Build And Deploy To Pi
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    env:
      GO_VERSION: "1.26.2"
      TARGET_GOOS: "linux"
      TARGET_GOARCH: "arm64"
      BINARY_NAME: "empirebusd"
      PI_HOST: "${{ vars.PI_HOST }}"
      PI_USER: "${{ vars.PI_USER }}"
      PI_PORT: "${{ vars.PI_PORT }}"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        run: go test ./...

      - name: Build release binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS="${TARGET_GOOS}" GOARCH="${TARGET_GOARCH}" \
            go build -trimpath -ldflags="-s -w" -o "dist/${BINARY_NAME}" ./cmd/empirebusd
          tar -C dist -czf "dist/${BINARY_NAME}-${TARGET_GOOS}-${TARGET_GOARCH}.tar.gz" "${BINARY_NAME}"

      - name: Join tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: "${{ secrets.TS_OAUTH_CLIENT_ID }}"
          oauth-secret: "${{ secrets.TS_OAUTH_SECRET }}"
          tags: "tag:XTURA-CI"

      - name: Validate deploy configuration
        run: |
          test -n "${PI_HOST}" || { echo "PI_HOST repository variable is required"; exit 1; }
          test -n "${PI_USER}" || { echo "PI_USER repository variable is required"; exit 1; }

      - name: Copy release bundle and deploy assets
        run: |
          PORT="${PI_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${PORT}"
          scp ${SSH_OPTS} \
            "dist/${BINARY_NAME}-${TARGET_GOOS}-${TARGET_GOARCH}.tar.gz" \
            "scripts/deploy/deploy-on-host.sh" \
            "ops/systemd/empirebusd.service" \
            "${PI_USER}@${PI_HOST}:/tmp/"

      - name: Deploy release on Pi
        run: |
          PORT="${PI_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${PORT}"
          ssh ${SSH_OPTS} "${PI_USER}@${PI_HOST}" "\
            chmod +x /tmp/deploy-on-host.sh && \
            sudo /tmp/deploy-on-host.sh \
              --artifact /tmp/${BINARY_NAME}-${TARGET_GOOS}-${TARGET_GOARCH}.tar.gz \
              --release ${GITHUB_SHA} \
              --install-root /opt/xtura \
              --config /var/lib/xtura/config.yaml \
              --service empirebusd \
              --service-file /tmp/empirebusd.service"

      - name: Health check
        run: |
          PORT="${PI_PORT:-22}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p ${PORT}"
          ssh ${SSH_OPTS} "${PI_USER}@${PI_HOST}" "curl --fail --silent --show-error http://127.0.0.1:8080/v1/health > /dev/null"
